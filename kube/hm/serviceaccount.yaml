# hm runs under its own ServiceAccount from day one: per the RFC's
# attestation design (sec 3.5), a frood's identity is its SA, and the SCRAM
# credential that arrives in v1 will be Secret-scoped to exactly this one.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hm
  namespace: fleet
  labels:
    app.kubernetes.io/name: hm
    app.kubernetes.io/part-of: fleet
